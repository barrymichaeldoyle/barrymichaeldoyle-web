[build]
command = "pnpm build"
publish = "dist/client"

# Security headers
[[headers]]
for = "/*"
[headers.values]
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Content-Security-Policy = "upgrade-insecure-requests"

# Hashed Vite assets — cache forever
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Static images
[[headers]]
for = "/*.png"
[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
for = "/*.webp"
[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
for = "/*.svg"
[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
for = "/blog/*.png"
[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
for = "/blog/*.webp"
[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Force HTTPS redirects
[[redirects]]
from = "http://barrymichaeldoyle.com/*"
to = "https://barrymichaeldoyle.com/:splat"
status = 301
force = true

[[redirects]]
from = "http://www.barrymichaeldoyle.com/*"
to = "https://barrymichaeldoyle.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://www.barrymichaeldoyle.com/*"
to = "https://barrymichaeldoyle.com/:splat"
status = 301
force = true
