packages:
  - packages/*

allowBuilds:
  '@parcel/watcher': true
  '@tailwindcss/oxide': true
  core-js: true
  esbuild: true
  protobufjs: true
  sharp: true

overrides:
  rollup: '>=4.59.0'
  esbuild: '>=0.28.1'
  '@opentelemetry/core': '>=2.8.0'

# Keep the 1-day supply-chain default, but allow packages we intentionally track closely.
minimumReleaseAgeExclude:
  - typescript
  - '@typescript/*'
  - posthog-js
  - '@posthog/*'
  - lucide-react
  - vite
  - preact
  - seroval
  - seroval-plugins
  - diff@8.0.3
  - js-yaml@3.14.2 || 3.15.0 || 4.1.2
  - mdast-util-to-hast@13.2.1
  - minimatch@5.1.7 || 5.1.8 || 9.0.6 || 9.0.7
  - rollup@4.59.0
  - ajv@8.18.0
  - h3@1.15.5 || 1.15.6 || 1.15.9
  - brace-expansion@2.0.3 || 5.0.6
  - node-forge@1.3.4 || 1.4.0
  - picomatch@2.3.2 || 4.0.4
  - yaml@2.8.3
  - lodash@4.17.23 || 4.17.24
  - defu@6.1.5
  - dompurify@3.3.4 || 3.4.0 || 3.4.6 || 3.4.7 || 3.4.8 || 3.4.9 || 3.4.11
  - postcss@8.5.10
  - fast-uri@3.1.1 || 3.1.2
  - tmp@0.2.6
  - esbuild@0.28.1
  - tar@7.5.16
  - '@babel/core@7.29.1'
  - '@opentelemetry/core@2.8.0'
